<head>
<meta charset="UTF-8">

<title>KobiAI — Maintenance Intelligence Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Icons + Data loaded as plain scripts (no JSX needed) -->
<script src="icons.js"></script>
<script src="data.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body, #root {
    width: 100%; height: 100%; overflow: hidden;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #0D1117;
    -webkit-font-smoothing: antialiased;
  }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #C5D0DB; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #9BA8B4; }

  /* Animations */
  @keyframes bounce {
    0%, 100% { transform: translateY(0); opacity: 0.5; }
    50% { transform: translateY(-5px); opacity: 1; }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }
  @keyframes wave {
    from { transform: scaleY(0.4); }
    to { transform: scaleY(1.2); }
  }
  @keyframes slideUp {
    from { transform: translateY(8px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes slideInRight {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Focus ring */
  button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
    outline: 2px solid #4CAF50;
    outline-offset: 2px;
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* Select / input base */
  select, input, textarea {
    font-family: inherit;
  }
</style>
</head>
<body>
<div id="root"></div>

<!-- Components loaded in dependency order -->
<script type="text/babel" src="context.jsx"></script>
<script type="text/babel" src="machinehome.jsx"></script>
<script type="text/babel" src="sidebar.jsx"></script>
<script type="text/babel" src="dialogs.jsx"></script>
<script type="text/babel" src="dashboard.jsx"></script>
<script type="text/babel" src="rightpanel.jsx"></script>
<script type="text/babel" src="chat.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
