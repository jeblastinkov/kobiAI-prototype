function LineChart({ data, xKey, yKey, color = '#1E3A5F', height = 80, annotation }) {
  if (!data?.length) return null;
  const vals = data.map(d => d[yKey]);
  const min = Math.min(...vals) * 0.9;
  const max = Math.max(...vals) * 1.05;
  const w = 300, h = height;
  const pts = data.map((d, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((d[yKey] - min) / (max - min)) * h;
    return [x, y];
  });
  const path = pts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(' ');
  const area = `${path} L${w},${h} L0,${h} Z`;

  return React.createElement('svg', { viewBox: `0 0 ${w} ${h}`, style: { width: '100%', height } },
    React.createElement('defs', null,
      React.createElement('linearGradient', { id: `grad-${color.replace('#','')}`, x1: 0, y1: 0, x2: 0, y2: 1 },
        React.createElement('stop', { offset: '0%', stopColor: color, stopOpacity: 0.2 }),
        React.createElement('stop', { offset: '100%', stopColor: color, stopOpacity: 0.02 })

    React.createElement('path', { d: area, fill: `url(#grad-${color.replace('#','')})` }),
    React.createElement('path', { d: path, fill: 'none', stroke: color, strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' }),
    annotation && pts[annotation.idx] && React.createElement('g', null,

      React.createElement('text', { x: pts[annotation.idx][0] + 4, y: pts[annotation.idx][1] - 6, fontSize: 9, fill: '#555' }, annotation.label)

}

function renderInline(text) {
  // Bold + italic inline
  const parts = [];
  let remaining = text;
  let key = 0;
  while (remaining.length > 0) {
    const boldMatch = remaining.match(/\*\*(.+?)\*\*/);
    const codeMatch = remaining.match(/`(.+?)`/);
    const italicMatch = remaining.match(/_(.+?)_/);
    const matches = [boldMatch, codeMatch, italicMatch].filter(Boolean).sort((a,b) => a.index - b.index);
    if (matches.length === 0) { parts.push(remaining); break; }
    const first = matches[0];
    if (first.index > 0) parts.push(remaining.slice(0, first.index));
    if (first === boldMatch) parts.push(React.createElement('strong', { key: key++ }, first[1]));
    else if (first === codeMatch) parts.push(React.createElement('code', { key: key++, style: { background: '#E8F0F8', padding: '1px 4px', borderRadius: 3, fontFamily: 'monospace', fontSize: '0.9em' } }, first[1]));
    else parts.push(React.createElement('em', { key: key++ }, first[1]));
    remaining = remaining.slice(first.index + first[0].length);
  }
  return parts;
